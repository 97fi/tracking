<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeittracking</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f5;display:flex;justify-content:center;padding:1rem}
.app{max-width:420px;width:100%;background:#fff;border:1px solid #e0e0e0;border-radius:16px;overflow:hidden}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #eee}
.topbar-title{font-size:15px;font-weight:500}
.nav{display:flex;border-bottom:1px solid #eee}
.nav-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:500;background:none;border:none;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.nav-btn.active{color:#111;border-bottom:2px solid #111}
.view{display:none;padding:12px 14px}
.view.active{display:block}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.date-nav button{background:none;border:1px solid #ddd;border-radius:8px;padding:4px 10px;cursor:pointer;font-size:13px}
.date-label{font-size:14px;font-weight:500}
.slots{display:flex;flex-direction:column;gap:2px}
.slot{display:flex;align-items:stretch;gap:8px;min-height:30px}
.slot-time{font-size:10px;color:#999;width:84px;flex-shrink:0;display:flex;align-items:center}
.slot-block{flex:1;border-radius:5px;padding:4px 8px;cursor:pointer;min-height:26px;display:flex;align-items:center;justify-content:space-between;border:1px solid transparent;user-select:none;-webkit-user-select:none;position:relative;overflow:hidden}
.slot-block:hover{opacity:0.82}
.slot-block.empty{background:#f5f5f5;border:1px dashed #ccc}
.slot-block.selecting-start{outline:2px solid #378ADD;outline-offset:1px}
.slot-block.in-range{background:#dbeeff !important;border-color:#378ADD !important;opacity:1 !important}
.slot-block.range-end{outline:2px solid #378ADD;outline-offset:1px}
.slot-label{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.slot-note{font-size:11px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:58%;opacity:0.85}
.sleep-collapsed{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;margin-bottom:2px}
.sleep-collapsed-bar{flex:1;height:8px;border-radius:4px;opacity:0.6}
.sleep-collapsed-label{font-size:11px;color:#888;white-space:nowrap}
.sleep-collapsed-arrow{font-size:11px;color:#aaa}
.mode-bar{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.mode-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid #ddd;background:none;cursor:pointer;color:#888}
.mode-btn.active{background:#111;color:#fff;border-color:#111}
.mode-hint{font-size:11px;color:#aaa;flex:1;text-align:right}
.picker-panel{background:#f8f8f8;border-radius:10px;padding:10px;margin-bottom:8px;border:1px solid #e8e8e8}
.picker-panel.hidden{display:none}
.picker-title{font-size:11px;color:#666;margin-bottom:7px;font-weight:500}
.picker-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:8px}
.cat-pill{padding:5px 4px;border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;text-align:center;border:none;line-height:1.3}
.cat-pill.clear{background:#fff;color:#666;border:1px solid #ddd}
.note-row{display:flex;gap:6px;margin-top:6px}
.note-input{flex:1;font-size:12px;padding:5px 8px;border-radius:8px;border:1px solid #ddd;background:#fff}
.note-save-btn{font-size:12px;padding:5px 10px;border-radius:8px;border:1px solid #ddd;background:none;cursor:pointer}
.day-summary{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap}
.summary-pill{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.week-bar{display:flex;height:10px;border-radius:5px;overflow:hidden;gap:1px;margin:6px 0 12px}
.stat-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.stat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stat-name{font-size:13px;flex:1}
.stat-val{font-size:13px;color:#666}
.settings-section-title{font-size:11px;font-weight:500;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.04em}
.cat-edit-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.cat-name-input{flex:1;font-size:13px;padding:4px 8px;border-radius:8px;border:1px solid #ddd}
.del-btn{background:none;border:none;cursor:pointer;color:#bbb;font-size:18px;padding:0 2px;line-height:1}
.add-btn{font-size:13px;padding:6px 12px;border-radius:8px;border:1px solid #ddd;background:none;cursor:pointer;width:100%}
.save-btn{font-size:13px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:none;cursor:pointer;width:100%;margin-top:8px;font-weight:500}
.sleep-config{background:#f8f8f8;border-radius:10px;padding:10px;margin-bottom:12px;border:1px solid #e8e8e8}
.sleep-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:13px}
.sleep-row select{font-size:12px;padding:3px 6px;border-radius:8px;border:1px solid #ddd;background:#fff}
.sleep-row label{color:#888;font-size:12px;min-width:60px}

.cal-wrap{background:#f8f8f8;border:1px solid #e0e0e0;border-radius:10px;padding:10px}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cal-header button{background:none;border:1px solid #ddd;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px}
.cal-month-label{font-size:13px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;color:#aaa;text-align:center;padding:2px 0}
.cal-day{font-size:12px;text-align:center;padding:5px 2px;border-radius:5px;cursor:pointer;color:#333}
.cal-day:hover{background:#eee}
.cal-day.today{font-weight:600;color:#111}
.cal-day.selected{background:#111;color:#fff;border-radius:5px}
.cal-day.has-data{position:relative}
.cal-day.has-data::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#888}
.cal-day.selected.has-data::after{background:#fff}
.cal-day.empty{cursor:default;color:#ccc}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="topbar-title">Zeittracking</span>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="exportData()" style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;background:none;cursor:pointer;color:#555">Export</button>
      <label style="font-size:11px;padding:3px 8px;border-radius:6px;border:1px solid #ddd;cursor:pointer;color:#555">Import<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
      <span style="font-size:11px;color:#aaa" id="sync-status">lokal</span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="showView('day',event)">Tag</button>
    <button class="nav-btn" onclick="showView('week',event)">Woche</button>
    <button class="nav-btn" onclick="showView('settings',event)">Kategorien</button>
  </div>

  <div class="view active" id="view-day">
    <div class="date-nav">
      <button onclick="changeDay(-1)">&#8592;</button>
      <span class="date-label" id="day-label" onclick="toggleCalendar()" style="cursor:pointer;border-bottom:1px dashed #ccc;padding-bottom:1px" title="Kalender öffnen"></span>
      <button onclick="changeDay(1)">&#8594;</button>
    </div>
    <div id="cal-container" style="display:none;margin-bottom:10px"></div>
    <div class="day-summary" id="day-summary"></div>
    <div style="font-size:11px;color:#aaa;margin-bottom:8px;text-align:right" id="mode-hint">1× tippen = Start wählen &nbsp;|&nbsp; Halten = Notiz</div>
    <div class="slots" id="slots-container"></div>
  </div>

  <div class="view" id="view-week">
    <div class="date-nav">
      <button onclick="changeWeek(-1)">&#8592;</button>
      <span class="date-label" id="week-label"></span>
      <button onclick="changeWeek(1)">&#8594;</button>
    </div>
    <div style="margin-top:8px" id="week-content"></div>
  </div>

  <div class="view" id="view-settings">
    <div class="sleep-config">
      <div class="settings-section-title">Schlafphasen</div>
      <div id="sleep-periods-list"></div>
      <button class="add-btn" style="margin-top:6px" onclick="addSleepPeriod()">+ Neue Schlafphase ab Datum</button>
      <div style="font-size:11px;color:#aaa;margin-top:6px">Die jeweils gültige Phase wird automatisch angewendet. Ältere Tage bleiben unverändert.</div>
    </div>
    <div class="settings-section-title">Kategorien verwalten</div>
    <div id="cat-edit-list"></div>
    <button class="add-btn" onclick="addCategory()">+ Neue Kategorie</button>
    <button class="save-btn" onclick="saveCategories()">Speichern</button>
  </div>
</div>

<script>
let inlinePickerSlotIdx = null;

let categories = [
  {id:'schlafen',name:'Schlafen',color:'#E49EDD'},
  {id:'maja',name:'Maja',color:'#E4B7FF'},
  {id:'haushalt',name:'Haushalt',color:'#83E28E'},
  {id:'aktiv',name:'aktive Erholung',color:'#66CCFF'},
  {id:'sport',name:'Sport',color:'#27BB83'},
  {id:'toktok',name:'Tok Tok quatsch',color:'#6600CC'},
  {id:'commuting',name:'Commuting',color:'#FDD741'},
  {id:'div',name:'div',color:'#D9D9D9'},
  {id:'feufeu',name:'Feu Feu',color:'#D50000'},
  {id:'computer',name:'Computer',color:'#3A4A86'},
  {id:'moeko',name:'Möko',color:'#FF6B35'},
  {id:'tutor',name:'Tutor',color:'#7030A0'},
  {id:'mle',name:'MLE',color:'#A13563'},
  {id:'klima',name:'Klimawandel',color:'#43A047'},
  {id:'fp',name:'FP',color:'#e16c75'},
  {id:'pda',name:'PDA',color:'#94DCF8'},
];

const _todayKey = (()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');})();
let sleepPeriods = [
  {from:_todayKey, catId:'schlafen', fromIdx:8, toIdx:27}
];
let sleepExpanded = false;
let entries = {};
let currentDay = new Date(); currentDay.setHours(0,0,0,0);
let currentWeekOffset = 0;
let rangeStart = null;
let holdTimer = null;
let hoverIdx = null;

function dateKey(d){return d.toISOString().slice(0,10)}
function getEntries(d){const k=dateKey(d);if(!entries[k])entries[k]={};return entries[k]}
function idxToHM(i){return{h:Math.floor(i/4),m:(i%4)*15}}
function slotKey(h,m){return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')}
function formatInterval(h,m){
  const nh=m===45?h+1:h,nm=(m+15)%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+'–'+String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
}
function contrastColor(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return (r*299+g*587+b*114)/1000>145?'#1a1a1a':'#ffffff';
}
function getSleepPeriodForDay(d){
  const dk = dateKey(d);
  const sorted = [...sleepPeriods].sort((a,b)=>a.from>b.from?-1:1);
  return sorted.find(p=>p.from<=dk) || sleepPeriods[0];
}
function isAutoSleepForDay(d, idx){
  const p = getSleepPeriodForDay(d);
  const f=p.fromIdx,t=p.toIdx;
  return f<=t?idx>=f&&idx<=t:idx>=f||idx<=t;
}
function isAutoSleep(idx){ return isAutoSleepForDay(currentDay, idx); }
function hasManualEntry(idx){
  const {h,m}=idxToHM(idx);
  const k=dateKey(currentDay);
  return !!(entries[k]&&entries[k][slotKey(h,m)]);
}
function getEffectiveEntry(d,idx){
  const {h,m}=idxToHM(idx);
  const key=slotKey(h,m);
  const de=getEntries(d);
  if(de[key]) return {entry:de[key],auto:false};
  if(isAutoSleepForDay(d,idx)){
    const p=getSleepPeriodForDay(d);
    const cat=categories.find(c=>c.id===p.catId);
    if(cat) return {entry:{cat:p.catId,note:''},auto:true};
  }
  return {entry:null,auto:false};
}
function isSleepIdx(idx){return isAutoSleepForDay(currentDay,idx)&&!hasManualEntry(idx);}

function setMode(m){
  mode=m;rangeStart=null;
  document.getElementById('mode-single').classList.toggle('active',m==='single');
  document.getElementById('mode-range').classList.toggle('active',m==='range');
  document.getElementById('mode-hint').textContent=m==='single'?'Tippen = Kategorie | Halten = Notiz':'Ersten Slot wählen, dann letzten';
  hideAllPanels();renderDay();
}
function hideAllPanels(){
  // inline pickers are removed on re-render
  inlinePickerSlotIdx = null;
}

function buildInlinePicker(forIdx, fromIdx, onSelect, onNoteMode){
  const panel = document.createElement('div');
  panel.className = 'picker-panel';
  panel.style.margin = '4px 0 4px 92px';

  const {h:fh,m:fm} = idxToHM(fromIdx);
  const {h:th,m:tm} = idxToHM(forIdx);
  const isSingle = fromIdx === forIdx;
  const titleText = isSingle
    ? formatInterval(fh,fm)
    : formatInterval(fh,fm)+' bis '+formatInterval(th,tm).split('–')[1];

  const title = document.createElement('div');
  title.className = 'picker-title';
  title.textContent = titleText;
  panel.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'picker-grid';
  categories.filter(c=>!c.archived).forEach(c => {
    const pill = document.createElement('button');
    pill.className = 'cat-pill';
    pill.style.background = c.color;
    pill.style.color = contrastColor(c.color);
    pill.textContent = c.name;
    pill.onclick = () => onSelect(c.id);
    grid.appendChild(pill);
  });
  const clr = document.createElement('button');
  clr.className = 'cat-pill clear'; clr.textContent = 'leeren';
  clr.onclick = () => onSelect(null);
  grid.appendChild(clr);
  panel.appendChild(grid);

  const noteRow = document.createElement('div');
  noteRow.className = 'note-row';
  const noteInp = document.createElement('input');
  noteInp.className = 'note-input'; noteInp.type = 'text';
  noteInp.placeholder = 'Notiz (optional)'; noteInp.id = 'inline-note-input';
  noteRow.appendChild(noteInp);
  panel.appendChild(noteRow);

  return panel;
}

function buildNoteEditPanel(key, currentNote, onSave){
  const panel = document.createElement('div');
  panel.className = 'picker-panel';
  panel.style.margin = '4px 0 4px 92px';
  const title = document.createElement('div');
  title.className = 'picker-title'; title.textContent = 'Notiz: '+key;
  panel.appendChild(title);
  const noteRow = document.createElement('div'); noteRow.className = 'note-row';
  const inp = document.createElement('input');
  inp.className = 'note-input'; inp.type = 'text';
  inp.value = currentNote || ''; inp.placeholder = 'Notiz eingeben...';
  setTimeout(()=>inp.focus(), 50);
  const btn = document.createElement('button');
  btn.className = 'note-save-btn'; btn.textContent = 'OK';
  btn.onclick = () => onSave(inp.value.trim());
  noteRow.appendChild(inp); noteRow.appendChild(btn);
  panel.appendChild(noteRow);
  return panel;
}

let calOpen = false;
let calViewYear = null;
let calViewMonth = null;

function toggleCalendar(){
  calOpen = !calOpen;
  if(calOpen){
    calViewYear = currentDay.getFullYear();
    calViewMonth = currentDay.getMonth();
    renderCalendar();
  }
  document.getElementById('cal-container').style.display = calOpen ? 'block' : 'none';
}

function renderCalendar(){
  const con = document.getElementById('cal-container');
  const y = calViewYear, mo = calViewMonth;
  const monthNames = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const firstDay = new Date(y, mo, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(y, mo+1, 0).getDate();
  const offset = firstDay === 0 ? 6 : firstDay - 1; // Mon=0

  con.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'cal-wrap';

  // month nav row
  const hdr = document.createElement('div'); hdr.className = 'cal-header';
  const prev = document.createElement('button'); prev.textContent = '‹';
  prev.onclick = ()=>{ calViewMonth--; if(calViewMonth<0){calViewMonth=11;calViewYear--;} renderCalendar(); };
  const lbl = document.createElement('span'); lbl.className = 'cal-month-label';
  lbl.textContent = monthNames[mo];
  const next = document.createElement('button'); next.textContent = '›';
  next.onclick = ()=>{ calViewMonth++; if(calViewMonth>11){calViewMonth=0;calViewYear++;} renderCalendar(); };
  hdr.appendChild(prev); hdr.appendChild(lbl); hdr.appendChild(next);
  wrap.appendChild(hdr);

  // year scroller row
  const yRow = document.createElement('div');
  yRow.style.cssText = 'display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px';
  const yPrev = document.createElement('button'); yPrev.textContent = '«';
  yPrev.style.cssText = 'background:none;border:1px solid #ddd;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px';
  yPrev.onclick = ()=>{ calViewYear--; renderCalendar(); };
  const yLbl = document.createElement('span');
  yLbl.style.cssText = 'font-size:14px;font-weight:600;color:#111;flex:1;text-align:center';
  yLbl.textContent = y;
  const yNext = document.createElement('button'); yNext.textContent = '»';
  yNext.style.cssText = 'background:none;border:1px solid #ddd;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:12px';
  yNext.onclick = ()=>{ calViewYear++; renderCalendar(); };

  // year input for direct entry
  const yInp = document.createElement('input');
  yInp.type = 'number'; yInp.value = y; yInp.min = 2000; yInp.max = 2100;
  yInp.style.cssText = 'width:58px;font-size:13px;font-weight:600;text-align:center;border:1px solid #ddd;border-radius:6px;padding:2px 4px;background:#fff';
  yInp.onchange = e=>{ const v=parseInt(e.target.value); if(v>=2000&&v<=2100){calViewYear=v;renderCalendar();} };

  yRow.appendChild(yPrev); yRow.appendChild(yInp); yRow.appendChild(yNext);
  wrap.appendChild(yRow);

  // grid
  const grid = document.createElement('div'); grid.className = 'cal-grid';
  ['Mo','Di','Mi','Do','Fr','Sa','So'].forEach(d=>{
    const dow = document.createElement('div'); dow.className = 'cal-dow'; dow.textContent = d;
    grid.appendChild(dow);
  });

  const today = new Date(); today.setHours(0,0,0,0);

  for(let i=0; i<offset; i++){
    const empty = document.createElement('div'); empty.className = 'cal-day empty'; empty.textContent = '';
    grid.appendChild(empty);
  }
  for(let d=1; d<=daysInMonth; d++){
    const date = new Date(y, mo, d);
    const dayEl = document.createElement('div'); dayEl.className = 'cal-day';
    dayEl.textContent = d;
    if(date.getTime() === today.getTime()) dayEl.classList.add('today');
    if(date.getTime() === currentDay.getTime()) dayEl.classList.add('selected');
    const dk = dateKey(date);
    if(entries[dk] && Object.keys(entries[dk]).length > 0) dayEl.classList.add('has-data');
    dayEl.onclick = ()=>{
      currentDay = date;
      inlinePickerSlotIdx = null; rangeStart = null;
      calOpen = false;
      document.getElementById('cal-container').style.display = 'none';
      renderDay();
    };
    grid.appendChild(dayEl);
  }
  wrap.appendChild(grid);
  con.appendChild(wrap);
}


function exportData(){
  const data = {
    exportedAt: new Date().toISOString(),
    entries,
    categories,
    sleepPeriods
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'zeittracking_' + date + '.json';
  a.click();
  URL.revokeObjectURL(url);
  const s = document.getElementById('sync-status');
  s.textContent = 'exportiert';
  setTimeout(()=>s.textContent='lokal', 2000);
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.entries) entries = data.entries;
      if(data.categories) categories = data.categories;
      if(data.sleepPeriods) sleepPeriods = data.sleepPeriods;
      renderDay();
      renderWeek();
      const s = document.getElementById('sync-status');
      s.textContent = 'importiert';
      setTimeout(()=>s.textContent='lokal', 2000);
    } catch(err) {
      alert('Fehler beim Import – ist das eine gültige Zeittracking-Datei?');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}


function saveLocal(){
  try{
    localStorage.setItem('zt_entries', JSON.stringify(entries));
    localStorage.setItem('zt_categories', JSON.stringify(categories));
    localStorage.setItem('zt_sleepPeriods', JSON.stringify(sleepPeriods));
  }catch(e){}
}

function loadLocal(){
  try{
    const e=localStorage.getItem('zt_entries');
    const c=localStorage.getItem('zt_categories');
    const s=localStorage.getItem('zt_sleepPeriods');
    if(e) entries=JSON.parse(e);
    if(c) categories=JSON.parse(c);
    if(s) sleepPeriods=JSON.parse(s);
  }catch(e){}
}

function renderDay(){
  document.getElementById('day-label').textContent=currentDay.toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
  const container=document.getElementById('slots-container');container.innerHTML='';
  let i=0;
  while(i<96){
    if(isSleepIdx(i)){
      const blockStart=i;let blockEnd=i;
      while(blockEnd+1<96&&isSleepIdx(blockEnd+1))blockEnd++;
      const sleepP=getSleepPeriodForDay(currentDay);
      const cat=categories.find(c=>c.id===sleepP.catId);
      const collapsed=document.createElement('div');collapsed.className='sleep-collapsed';
      const bar=document.createElement('div');bar.className='sleep-collapsed-bar';
      bar.style.background=cat?cat.color:'#E49EDD';
      const {h:sh,m:sm}=idxToHM(blockStart);
      const {h:eh,m:em}=idxToHM(blockEnd);
      const nem=em===45?eh+1:eh,nmm=(em+15)%60;
      const mins=(blockEnd-blockStart+1)*15;
      const label=document.createElement('span');label.className='sleep-collapsed-label';
      label.textContent=(cat?cat.name:sleepP.catId)+' · '+String(sh).padStart(2,'0')+':'+String(sm).padStart(2,'0')+'–'+String(nem).padStart(2,'0')+':'+String(nmm).padStart(2,'0')+' · '+Math.floor(mins/60)+'h'+(mins%60?String(mins%60).padStart(2,'0')+'m':'');
      const arrow=document.createElement('span');arrow.className='sleep-collapsed-arrow';arrow.textContent=sleepExpanded?'▲':'▼';
      collapsed.appendChild(bar);collapsed.appendChild(label);collapsed.appendChild(arrow);
      collapsed.onclick=()=>{sleepExpanded=!sleepExpanded;renderDay();};
      container.appendChild(collapsed);
      if(sleepExpanded){for(let j=blockStart;j<=blockEnd;j++){container.appendChild(buildSlotEl(j));maybeInjectPicker(container,j);}}
      i=blockEnd+1;
    } else {
      container.appendChild(buildSlotEl(i));
      maybeInjectPicker(container,i);
      i++;
    }
  }
  renderDaySummary();
  updateHint();

  // Global hover listener for range highlight — no re-render, just CSS classes
  const con2 = document.getElementById('slots-container');
  con2.addEventListener('mouseover', handleRangeHover);
  con2.addEventListener('touchmove', handleRangeTouchMove, {passive:true});
}

function handleRangeHover(e){
  if(rangeStart===null||inlinePickerSlotIdx!==null) return;
  const block = e.target.closest('.slot-block');
  if(!block||block._slotIdx===undefined) return;
  const newHover = block._slotIdx;
  if(newHover===hoverIdx) return;
  hoverIdx = newHover;
  updateRangeHighlight();
}

function handleRangeTouchMove(e){
  if(rangeStart===null||inlinePickerSlotIdx!==null) return;
  const t=e.touches[0];
  const el=document.elementFromPoint(t.clientX,t.clientY);
  const block=el&&el.closest?el.closest('.slot-block'):null;
  if(!block||block._slotIdx===undefined) return;
  if(block._slotIdx===hoverIdx) return;
  hoverIdx=block._slotIdx;
  updateRangeHighlight();
}

function updateRangeHighlight(){
  if(rangeStart===null) return;
  const from=Math.min(rangeStart,hoverIdx??rangeStart);
  const to=Math.max(rangeStart,hoverIdx??rangeStart);
  document.querySelectorAll('.slot-block').forEach(b=>{
    if(b._slotIdx===undefined) return;
    const idx=b._slotIdx;
    b.classList.toggle('in-range', idx>from && idx<=to);
    b.classList.toggle('range-end', idx===to && idx!==rangeStart);
  });
}

function maybeInjectPicker(container, i){
  if(inlinePickerSlotIdx === null) return;
  const {type, atIdx, fromIdx} = inlinePickerSlotIdx;
  if(i !== atIdx) return;
  const {h,m}=idxToHM(atIdx);
  const key=slotKey(h,m);
  if(type === 'cat'){
    const picker = buildInlinePicker(atIdx, fromIdx, (catId)=>{
      const note = document.getElementById('inline-note-input') ? document.getElementById('inline-note-input').value.trim() : '';
      const from = fromIdx, to = atIdx;
      const k=dateKey(currentDay);if(!entries[k])entries[k]={};
      for(let j=Math.min(from,to);j<=Math.max(from,to);j++){
        const {h:jh,m:jm}=idxToHM(j);const jk=slotKey(jh,jm);
        if(catId)entries[k][jk]={cat:catId,note:j===Math.min(from,to)?note:''};else delete entries[k][jk];
      }
      inlinePickerSlotIdx=null;rangeStart=null;saveLocal();renderDay();
    });
    container.appendChild(picker);
  } else if(type === 'note'){
    const {entry}=getEffectiveEntry(currentDay,atIdx);
    const notePanel = buildNoteEditPanel(key, entry?entry.note:'', (note)=>{
      const k=dateKey(currentDay);if(!entries[k])entries[k]={};
      if(entries[k][key])entries[k][key].note=note;
      inlinePickerSlotIdx=null;saveLocal();renderDay();
    });
    container.appendChild(notePanel);
  }
}

function updateHint(){
  const el = document.getElementById('mode-hint');
  if(!el) return;
  if(rangeStart !== null) el.textContent = 'Letzten Slot antippen — oder denselben nochmal für Einzelslot';
  else el.textContent = '1× tippen = Start wählen \u00a0|\u00a0 Halten = Notiz';
}

function buildSlotEl(i){
  const {h,m}=idxToHM(i);const key=slotKey(h,m);
  const {entry,auto}=getEffectiveEntry(currentDay,i);
  const cat=entry?categories.find(c=>c.id===entry.cat):null;
  const prevResult=i>0?getEffectiveEntry(currentDay,i-1):{entry:null};
  const isCont=prevResult.entry&&entry&&prevResult.entry.cat===entry.cat&&!isSleepIdx(i-1);
  const isStart = rangeStart === i;

  const slot=document.createElement('div');slot.className='slot';
  const timeEl=document.createElement('span');timeEl.className='slot-time';timeEl.textContent=formatInterval(h,m);slot.appendChild(timeEl);
  const block=document.createElement('div');
  const isPickerRange = inlinePickerSlotIdx!==null && inlinePickerSlotIdx.type==='cat' && i>=Math.min(inlinePickerSlotIdx.fromIdx,inlinePickerSlotIdx.atIdx) && i<=Math.max(inlinePickerSlotIdx.fromIdx,inlinePickerSlotIdx.atIdx);
  block.className='slot-block'+(cat?'':' empty');
  if(isStart) block.classList.add('selecting-start');
  if(isPickerRange) block.classList.add('in-range');
  if(cat){
    block.style.background=cat.color;block.style.borderColor=cat.color;
    const tc=contrastColor(cat.color);
    if(!isCont){
      const lbl=document.createElement('span');lbl.className='slot-label';lbl.style.color=tc;lbl.textContent=cat.name;block.appendChild(lbl);
      if(entry.note){const note=document.createElement('span');note.className='slot-note';note.style.color=tc;note.textContent=entry.note;block.appendChild(note);}
    }
  } else {
    const lbl=document.createElement('span');lbl.className='slot-label';lbl.textContent='';block.appendChild(lbl);
  }

  const startHold=(e)=>{
    if(!cat)return;e.preventDefault();
    holdTimer=setTimeout(()=>{
      holdTimer=null;rangeStart=null;
      const k=dateKey(currentDay);if(!entries[k])entries[k]={};
      const _sp=getSleepPeriodForDay(currentDay);if(!entries[k][key]&&auto)entries[k][key]={cat:_sp.catId,note:''};
      inlinePickerSlotIdx={type:'note',atIdx:i,fromIdx:i};
      renderDay();
    },600);
  };
  const cancelHold=()=>{clearTimeout(holdTimer);holdTimer=null;};

  block.addEventListener('mousedown',startHold);
  block.addEventListener('touchstart',startHold,{passive:false});
  block.addEventListener('mouseup',()=>{if(holdTimer){cancelHold();handleTap(i,key,h,m,entry,auto);}});
  block.addEventListener('touchend',()=>{if(holdTimer){cancelHold();handleTap(i,key,h,m,entry,auto);}});
  block.addEventListener('mouseleave',cancelHold);
  block._slotIdx=i;
  block.addEventListener('click',()=>{handleTap(i,key,h,m,entry,auto);});

  slot.appendChild(block);return slot;
}

function handleTap(idx,key,h,m,entry,auto){
  if(rangeStart === null){
    rangeStart = idx;
    hoverIdx = null;
    inlinePickerSlotIdx = null;
    renderDay();
  } else if(rangeStart === idx){
    inlinePickerSlotIdx = {type:'cat', atIdx:idx, fromIdx:idx};
    rangeStart = null;
    hoverIdx = null;
    renderDay();
  } else {
    const from = Math.min(rangeStart, idx), to = Math.max(rangeStart, idx);
    inlinePickerSlotIdx = {type:'cat', atIdx:to, fromIdx:from};
    rangeStart = null;
    hoverIdx = null;
    renderDay();
  }
}

function renderDaySummary(){
  const counts={};
  for(let i=0;i<96;i++){const {entry}=getEffectiveEntry(currentDay,i);if(entry&&entry.cat)counts[entry.cat]=(counts[entry.cat]||0)+1;}
  const summary=document.getElementById('day-summary');summary.innerHTML='';
  Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5).forEach(([id,n])=>{
    const cat=categories.find(c=>c.id===id);if(!cat)return;
    const pill=document.createElement('span');pill.className='summary-pill';
    pill.style.background=cat.color;pill.style.color=contrastColor(cat.color);
    const h=Math.floor(n*15/60),min=n*15%60;
    pill.textContent=cat.name+' '+h+'h'+(min?min+'m':'');summary.appendChild(pill);
  });
}

function changeDay(d){currentDay=new Date(currentDay.getTime()+d*86400000);inlinePickerSlotIdx=null;rangeStart=null;hoverIdx=null;renderDay();}

function getWeekStart(offset){
  const now=new Date();now.setHours(0,0,0,0);const day=now.getDay();
  const mon=new Date(now.getTime()-((day===0?6:day-1))*86400000);mon.setDate(mon.getDate()+offset*7);return mon;
}
function renderWeek(){
  const ws=getWeekStart(currentWeekOffset);const we=new Date(ws.getTime()+6*86400000);
  document.getElementById('week-label').textContent=ws.toLocaleDateString('de-DE',{day:'numeric',month:'short'})+' – '+we.toLocaleDateString('de-DE',{day:'numeric',month:'short'});
  const totals={};let total=0;
  for(let i=0;i<7;i++){const d=new Date(ws.getTime()+i*86400000);for(let j=0;j<96;j++){const {entry}=getEffectiveEntry(d,j);if(entry&&entry.cat){totals[entry.cat]=(totals[entry.cat]||0)+1;total++;}}}
  const content=document.getElementById('week-content');content.innerHTML='';
  if(total===0){const p=document.createElement('p');p.style.cssText='font-size:13px;color:#aaa;text-align:center;padding:24px 0';p.textContent='Noch keine Einträge diese Woche';content.appendChild(p);return;}
  const bar=document.createElement('div');bar.className='week-bar';
  Object.entries(totals).sort((a,b)=>b[1]-a[1]).forEach(([id,n])=>{const cat=categories.find(c=>c.id===id);if(!cat)return;const seg=document.createElement('div');seg.style.cssText='flex:'+n+';background:'+cat.color;bar.appendChild(seg);});
  content.appendChild(bar);
  Object.entries(totals).sort((a,b)=>b[1]-a[1]).forEach(([id,n])=>{
    const cat=categories.find(c=>c.id===id);if(!cat)return;
    const row=document.createElement('div');row.className='stat-row';
    const dot=document.createElement('div');dot.className='stat-dot';dot.style.background=cat.color;
    const name=document.createElement('span');name.className='stat-name';name.textContent=cat.name;
    const val=document.createElement('span');val.className='stat-val';const mins=n*15;val.textContent=Math.floor(mins/60)+'h '+String(mins%60).padStart(2,'0')+'m';
    row.appendChild(dot);row.appendChild(name);row.appendChild(val);content.appendChild(row);
  });
}
function changeWeek(d){currentWeekOffset+=d;renderWeek();}

function timeOptions(selectedIdx){
  const sel=document.createElement('select');
  sel.style.cssText='font-size:11px;padding:2px 4px;border-radius:6px;border:1px solid #ddd;background:#fff';
  for(let i=0;i<96;i++){
    const {h,m}=idxToHM(i);
    const opt=document.createElement('option');opt.value=i;
    opt.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
    if(i===selectedIdx)opt.selected=true;
    sel.appendChild(opt);
  }
  return sel;
}

function renderSleepConfig(){
  const list=document.getElementById('sleep-periods-list');
  if(!list)return;
  list.innerHTML='';
  const sorted=[...sleepPeriods].sort((a,b)=>a.from>b.from?1:-1);
  sorted.forEach((p,si)=>{
    const realIdx=sleepPeriods.indexOf(p);
    const block=document.createElement('div');
    block.style.cssText='background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:8px 10px;margin-bottom:8px';

    // date row
    const dateRow=document.createElement('div');
    dateRow.style.cssText='display:flex;align-items:center;gap:8px;margin-bottom:6px';
    const dateLbl=document.createElement('span');
    dateLbl.style.cssText='font-size:11px;color:#888;min-width:32px';
    dateLbl.textContent='Ab';
    const dateInp=document.createElement('input');
    dateInp.type='date';dateInp.value=p.from;
    dateInp.style.cssText='font-size:12px;padding:2px 6px;border:1px solid #ddd;border-radius:6px;background:#fff';
    dateInp.onchange=e=>{sleepPeriods[realIdx].from=e.target.value;renderSleepConfig();};
    dateRow.appendChild(dateLbl);dateRow.appendChild(dateInp);
    const del=document.createElement('button');del.textContent='×';
    del.style.cssText='background:none;border:none;cursor:pointer;color:#bbb;font-size:16px;margin-left:auto;padding:0';
    del.onclick=()=>{sleepPeriods.splice(realIdx,1);renderSleepConfig();};
    dateRow.appendChild(del);
    block.appendChild(dateRow);

    // cat + time row
    const timeRow=document.createElement('div');
    timeRow.style.cssText='display:flex;align-items:center;gap:6px;flex-wrap:wrap';
    const catSel=document.createElement('select');
    catSel.style.cssText='font-size:11px;padding:2px 4px;border-radius:6px;border:1px solid #ddd;background:#fff;flex:1;min-width:80px';
    categories.forEach(c=>{
      const opt=document.createElement('option');opt.value=c.id;opt.textContent=c.name;
      if(c.id===p.catId)opt.selected=true;catSel.appendChild(opt);
    });
    catSel.onchange=e=>sleepPeriods[realIdx].catId=e.target.value;

    const fromSel=timeOptions(p.fromIdx);
    fromSel.onchange=e=>sleepPeriods[realIdx].fromIdx=parseInt(e.target.value);

    // toIdx stored = last sleep slot index; user sees/sets toIdx+1 (the end time)
    const toSel=timeOptions(p.toIdx+1);
    toSel.onchange=e=>{sleepPeriods[realIdx].toIdx=parseInt(e.target.value)-1;};

    const bisLbl=document.createElement('span');bisLbl.style.cssText='font-size:11px;color:#aaa';bisLbl.textContent='bis';

    timeRow.appendChild(catSel);timeRow.appendChild(fromSel);timeRow.appendChild(bisLbl);timeRow.appendChild(toSel);
    block.appendChild(timeRow);
    list.appendChild(block);
  });
}

function addSleepPeriod(){
  const today=dateKey(new Date());
  sleepPeriods.push({from:today,catId:'schlafen',fromIdx:8,toIdx:28});
  renderSleepConfig();
}

function renderSettings(){
  renderSleepConfig();
  const list=document.getElementById('cat-edit-list');list.innerHTML='';

  const active=categories.filter(c=>!c.archived);
  const archived=categories.filter(c=>c.archived);

  const makeRow=(cat,i)=>{
    const idx=categories.indexOf(cat);
    const row=document.createElement('div');row.className='cat-edit-row';
    if(cat.archived) row.style.opacity='0.5';
    const sw=document.createElement('input');sw.type='color';sw.value=cat.color;
    sw.style.cssText='width:26px;height:26px;padding:0;border:1px solid #ddd;border-radius:4px;cursor:pointer;flex-shrink:0';
    sw.oninput=e=>categories[idx].color=e.target.value;
    const inp=document.createElement('input');inp.type='text';inp.className='cat-name-input';inp.value=cat.name;
    inp.oninput=e=>categories[idx].name=e.target.value;
    if(cat.archived) inp.style.textDecoration='line-through';

    const archBtn=document.createElement('button');
    archBtn.style.cssText='background:none;border:1px solid #ddd;border-radius:6px;cursor:pointer;font-size:11px;padding:2px 7px;color:#888;white-space:nowrap';
    archBtn.textContent=cat.archived?'aktivieren':'archiv.';
    archBtn.onclick=()=>{categories[idx].archived=!categories[idx].archived;renderSettings();};

    const del=document.createElement('button');del.className='del-btn';del.textContent='×';
    del.onclick=()=>{categories.splice(idx,1);renderSettings();};

    row.appendChild(sw);row.appendChild(inp);row.appendChild(archBtn);row.appendChild(del);
    list.appendChild(row);
  };

  if(active.length){
    const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:#aaa;margin:0 0 6px;text-transform:uppercase;letter-spacing:0.04em';lbl.textContent='Aktiv';
    list.appendChild(lbl);
    active.forEach(makeRow);
  }
  if(archived.length){
    const lbl=document.createElement('div');lbl.style.cssText='font-size:11px;color:#aaa;margin:12px 0 6px;text-transform:uppercase;letter-spacing:0.04em';lbl.textContent='Archiviert';
    list.appendChild(lbl);
    archived.forEach(makeRow);
  }
}
function addCategory(){categories.push({id:'cat_'+Date.now(),name:'Neu',color:'#AAAAAA',archived:false});renderSettings();}
function saveCategories(){saveLocal();renderDay();renderWeek();renderSleepConfig();const s=document.getElementById('sync-status');s.textContent='gespeichert';setTimeout(()=>s.textContent='lokal',1500);}

function showView(name,event){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+name).classList.add('active');
  if(event&&event.target)event.target.classList.add('active');
  if(name==='week')renderWeek();
  if(name==='settings')renderSettings();
  if(name==='day')renderDay();
}

loadLocal();
renderDay();
</script>
</body>
